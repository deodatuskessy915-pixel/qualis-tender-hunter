name: Daily Tender Scrape & Deploy


on:
  schedule:
    - cron: '0 3 * * *'→ Runs at 03:00

  workflow_dispatch:


jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest


    steps:


      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}


      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'


      - name: Run NeST scraper
        run: python nest_scraper.py


      - name: Send email alert (if new matches)
        run: python send_alert.py
        continue-on-error: true
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}


      - name: Build dashboard HTML
        run: python build_dashboard.py


      - name: Deploy to Netlify
        run: |
